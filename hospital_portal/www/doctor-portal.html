<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor / OPD Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
  :root { --bg:#0d1117; --surface:#161b22; --border:#21262d; --text:#e6edf3; --muted:#8b949e; --accent:#a371f7; --blue:#4f8ef7; --green:#3fb950; --red:#f85149; --yellow:#d29922; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar-title { font-weight:600; }
  .dept-badge { background:rgba(163,113,247,0.15); color:var(--accent); border:1px solid rgba(163,113,247,0.3); padding:2px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:12px; font-size:0.85rem; color:var(--muted); }
  .btn-sm { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#f85149; padding:5px 12px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.78rem; }

  .main { display:grid; grid-template-columns:300px 1fr; gap:20px; padding:24px; max-width:1400px; margin:0 auto; }

  /* Queue */
  .queue-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; height:fit-content; position:sticky; top:76px; }
  .panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-header h2 { font-size:0.9rem; font-weight:600; }
  .count-badge { background:rgba(163,113,247,0.15); color:var(--accent); padding:2px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .patient-list { overflow-y:auto; max-height:500px; }
  .patient-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .patient-item:hover { background:rgba(255,255,255,0.03); }
  .patient-item.active { background:rgba(163,113,247,0.08); border-left:3px solid var(--accent); }
  .p-token { font-size:0.8rem; font-weight:700; color:var(--accent); }
  .p-name { font-weight:500; font-size:0.9rem; margin-top:2px; }
  .p-detail { font-size:0.73rem; color:var(--muted); }
  .triage-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }

  /* Consultation form */
  .consult-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--muted); }

  .patient-header { padding:18px 24px; border-bottom:1px solid var(--border); }
  .patient-header h2 { font-size:1.1rem; font-weight:600; }
  .patient-meta { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; font-size:0.8rem; color:var(--muted); }
  .meta-tag { background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }

  /* Vitals summary */
  .vitals-summary { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:16px 24px; background:rgba(163,113,247,0.04); border-bottom:1px solid var(--border); }
  .vs-item { text-align:center; }
  .vs-val { font-size:1.1rem; font-weight:700; color:var(--accent); }
  .vs-label { font-size:0.65rem; color:var(--muted); margin-top:2px; }

  .consult-body { padding:24px; }
  .section-title { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .form-grid .full { grid-column:1/-1; }
  .field label { display:block; font-size:0.72rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px; font-weight:500; }
  .field input,.field select,.field textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:10px 13px; color:var(--text); font-family:inherit; font-size:0.88rem; outline:none; transition:all 0.2s; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); background:rgba(163,113,247,0.05); }
  .field textarea { resize:vertical; min-height:70px; }
  .field select option { background:#1a1f2e; }

  /* Medicine table */
  .rx-table { width:100%; border-collapse:collapse; margin-bottom:10px; }
  .rx-table th { font-size:0.72rem; color:var(--muted); text-align:left; padding:6px 10px; border-bottom:1px solid var(--border); }
  .rx-table td { padding:6px; border-bottom:1px solid rgba(33,38,45,0.5); }
  .rx-table input,.rx-table select { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:7px; padding:6px 9px; color:var(--text); font-family:inherit; font-size:0.82rem; outline:none; width:100%; }
  .rx-table input:focus,.rx-table select:focus { border-color:var(--accent); }
  .btn-add-row { background:rgba(163,113,247,0.1); border:1px solid rgba(163,113,247,0.3); color:var(--accent); padding:7px 14px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:0.8rem; margin-top:4px; }
  .btn-del { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.2); color:#f85149; padding:4px 8px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:0.75rem; }

  /* Lab / Radiology orders */
  .order-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .order-item { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:8px 12px; cursor:pointer; transition:all 0.2s; }
  .order-item:hover { border-color:var(--accent); }
  .order-item input[type=checkbox] { accent-color:var(--accent); width:15px; height:15px; }
  .order-item label { font-size:0.84rem; cursor:pointer; }

  .btn-primary { background:linear-gradient(135deg,#a371f7,#7c3aed); border:none; border-radius:10px; color:white; padding:12px 24px; font-family:inherit; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(163,113,247,0.25); width:100%; margin-top:4px; }
  .btn-primary:hover { transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .msg { padding:10px 14px; border-radius:9px; font-size:0.85rem; margin-top:10px; display:none; }
  .msg.error { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#fca5a5; }
  .msg.success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#86efac; }

  /* Invoice preview */
  .invoice-preview { background:rgba(63,185,80,0.05); border:1px solid rgba(63,185,80,0.2); border-radius:10px; padding:14px; margin-top:12px; display:none; }
  .invoice-preview h4 { font-size:0.85rem; font-weight:600; color:var(--green); margin-bottom:10px; }
  .inv-row { display:flex; justify-content:space-between; font-size:0.82rem; padding:3px 0; }
  .inv-row.total { border-top:1px solid var(--border); padding-top:8px; margin-top:4px; font-weight:700; color:var(--green); font-size:0.9rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:1.2rem">👨‍⚕️</span>
    <span class="topbar-title">Doctor / OPD Consultation</span>
    <span class="dept-badge">Doctor</span>
  </div>
  <div class="topbar-right">
    <span id="staffName">Loading...</span>
    <button class="btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <!-- Queue -->
  <div class="queue-panel">
    <div class="panel-header">
      <h2>Doctor Queue</h2>
      <span class="count-badge" id="queueCount">0</span>
    </div>
    <div class="patient-list" id="patientList">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Loading...</div>
    </div>
  </div>

  <!-- Consultation -->
  <div class="consult-panel" id="consultPanel">
    <div class="empty-state">
      <div style="font-size:3rem">👨‍⚕️</div>
      <div>Select a patient from the queue</div>
    </div>
  </div>
</div>

<script>
const LAB_TESTS = ['CBC (Complete Blood Count)','Blood Sugar (Fasting)','Blood Sugar (Random)','HbA1c','Lipid Profile','Liver Function Test','Kidney Function Test','Thyroid Profile','Urine Routine','ECG','Blood Culture','Dengue NS1'];
const RADIOLOGY = ['X-Ray Chest','X-Ray Hand','Ultrasound Abdomen','CT Scan Head','MRI Brain','Echo (Echocardiogram)','2D Echo','HRCT Chest'];
const CONSULT_FEE = 500;

let selectedPatient = null;
let vitalsData = null;
let medicines = [{ name:'',dose:'',freq:'',duration:'',instructions:'' }];

async function checkAuth() {
  try {
    const res = await fetch('/api/method/frappe.auth.get_logged_user',{credentials:'include'});
    const data = await res.json();
    const user = data.message;
    if (!user||user==='Guest') { window.location.href='/login'; return; }
    document.getElementById('staffName').textContent = user;
    const roleRes = await fetch(`/api/resource/User/${encodeURIComponent(user)}?fields=["roles"]`,{credentials:'include'});
    const roleData = await roleRes.json();
    const roles = (roleData.data?.roles||[]).map(r=>r.role);
    if (!roles.some(r=>['Doctor','System Manager','Administrator'].includes(r))) {
      alert('Access denied.'); window.location.href='/login';
    }
  } catch(e) { window.location.href='/login'; }
}
function getCsrf() { const m=document.cookie.split(';').map(c=>c.trim().split('=')).find(c=>c[0]==='csrf_token'); return m?m[1]:''; }
function doLogout() { fetch('/api/method/logout',{credentials:'include'}).then(()=>{ window.location.href='/login'; }); }

const triageColors = {'1':'#f85149','2':'#f0883e','3':'#d29922','4':'#3fb950','5':'#4f8ef7'};

async function loadQueue() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const res = await fetch(`/api/resource/Patient Registration?fields=["name","patient_name","token_number","triage_status","triage_level","chief_complaint","visit_type","date_of_birth","gender","phone"]&filters=[["creation",">=","${today} 00:00:00"],["triage_status","=","Vitals Recorded"]]&order_by=triage_level asc,token_number asc&limit=50`,{credentials:'include'});
    const data = await res.json();
    const list = data.data || [];
    document.getElementById('queueCount').textContent = list.length;
    if (!list.length) {
      document.getElementById('patientList').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">No patients in queue ✓</div>';
      return;
    }
    document.getElementById('patientList').innerHTML = list.map(p=>{
      const color = triageColors[String(p.triage_level)]||'#4f8ef7';
      return `<div class="patient-item ${selectedPatient?.name===p.name?'active':''}" onclick='selectPatient(${JSON.stringify(p)})'>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="p-token">${p.token_number||'—'}</span>
          <span class="triage-dot" style="background:${color}"></span>
        </div>
        <div class="p-name">${p.patient_name}</div>
        <div class="p-detail">${p.visit_type||'OPD'} · ${(p.chief_complaint||'').substring(0,30)}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function selectPatient(p) {
  selectedPatient = p;
  medicines = [{name:'',dose:'',freq:'',duration:'',instructions:''}];
  loadQueue();

  // Fetch vitals
  try {
    const vsRes = await fetch(`/api/resource/Vital Signs?fields=["*"]&filters=[["patient","=","${p.name}"]]&order_by=creation desc&limit=1`,{credentials:'include'});
    const vsData = await vsRes.json();
    vitalsData = (vsData.data||[])[0] || null;
  } catch(e) { vitalsData = null; }

  const age = p.date_of_birth ? Math.floor((Date.now()-new Date(p.date_of_birth))/(365.25*24*3600*1000)) : '—';
  const vs = vitalsData;

  document.getElementById('consultPanel').innerHTML = `
    <div class="patient-header">
      <h2>${p.patient_name} <span style="font-size:0.8rem;color:var(--muted);font-weight:400">Token: ${p.token_number||'—'}</span></h2>
      <div class="patient-meta">
        <span class="meta-tag">🪪 ${p.name}</span>
        <span class="meta-tag">🎂 ${age} yrs</span>
        <span class="meta-tag">⚧ ${p.gender||'—'}</span>
        <span class="meta-tag">📞 ${p.phone||'—'}</span>
        <span class="meta-tag">🏥 ${p.visit_type||'OPD'}</span>
        ${vs?`<span class="meta-tag" style="color:#d29922">⚠️ Allergy: ${vs.allergy||'None'}</span>`:''}
      </div>
    </div>

    ${vs?`<div class="vitals-summary">
      <div class="vs-item"><div class="vs-val">${vs.temperature||'—'}°F</div><div class="vs-label">Temperature</div></div>
      <div class="vs-item"><div class="vs-val">${vs.bp_systolic||'—'}/${vs.bp_diastolic||'—'}</div><div class="vs-label">BP (mmHg)</div></div>
      <div class="vs-item"><div class="vs-val">${vs.pulse_rate||'—'}</div><div class="vs-label">Pulse (bpm)</div></div>
      <div class="vs-item"><div class="vs-val">${vs.spo2||'—'}%</div><div class="vs-label">SpO2</div></div>
      <div class="vs-item"><div class="vs-val">${vs.blood_sugar||'—'}</div><div class="vs-label">Sugar (mg/dL)</div></div>
    </div>`:'<div style="padding:12px 24px;font-size:0.82rem;color:var(--muted);background:rgba(248,81,73,0.05);">⚠️ Vitals not recorded yet.</div>'}

    <div class="consult-body">

      <div class="section-title">Consultation</div>
      <div class="form-grid">
        <div class="field full"><label>Chief Complaint</label><input type="text" id="c-complaint" value="${(p.chief_complaint||'').replace(/"/g,'&quot;')}"/></div>
        <div class="field full"><label>History of Present Illness</label><textarea id="c-hpi" placeholder="HPI details..."></textarea></div>
        <div class="field"><label>Diagnosis (Primary) *</label><input type="text" id="c-diag" placeholder="e.g. Type 2 DM, Hypertension" /></div>
        <div class="field"><label>Diagnosis (Secondary)</label><input type="text" id="c-diag2" placeholder="Secondary diagnosis" /></div>
        <div class="field full"><label>Clinical Notes / Examination Findings</label><textarea id="c-notes" placeholder="Examination findings, clinical notes..."></textarea></div>
        <div class="field">
          <label>Disposition</label>
          <select id="c-disp">
            <option value="OPD">OPD — Outpatient</option>
            <option value="IPD">Admit to IPD</option>
            <option value="ICU">Admit to ICU</option>
            <option value="Discharge">Discharge</option>
            <option value="Refer">Refer to Specialist</option>
          </select>
        </div>
        <div class="field"><label>Follow-up Date</label><input type="date" id="c-followup" /></div>
      </div>

      <div class="section-title">Prescription (Medicines)</div>
      <table class="rx-table">
        <thead><tr><th>Medicine Name</th><th>Dose</th><th>Frequency</th><th>Duration</th><th>Instructions</th><th></th></tr></thead>
        <tbody id="rxTableBody"></tbody>
      </table>
      <button class="btn-add-row" onclick="addMedicineRow()">+ Add Medicine</button>

      <div class="section-title" style="margin-top:20px">Lab Orders</div>
      <div class="order-grid" id="labOrders">
        ${LAB_TESTS.map((t,i)=>`<div class="order-item"><input type="checkbox" id="lab-${i}"><label for="lab-${i}">${t}</label></div>`).join('')}
      </div>

      <div class="section-title">Radiology Orders</div>
      <div class="order-grid" id="radOrders">
        ${RADIOLOGY.map((t,i)=>`<div class="order-item"><input type="checkbox" id="rad-${i}"><label for="rad-${i}">${t}</label></div>`).join('')}
      </div>

      <div class="section-title">Billing Preview</div>
      <div class="invoice-preview" id="invoicePreview">
        <h4>📄 Sales Invoice (Preview)</h4>
        <div id="invItems"></div>
      </div>

      <button class="btn-primary" id="saveConsultBtn" onclick="saveConsultation()">
        Save Consultation + Create Prescription + Generate Invoice
      </button>
      <div class="msg error" id="c-err"></div>
      <div class="msg success" id="c-succ"></div>
    </div>
  `;

  renderRxTable();
  updateInvoicePreview();

  // Update invoice preview on change
  document.querySelectorAll('[id^="lab-"],[id^="rad-"]').forEach(cb=>{
    cb.addEventListener('change', updateInvoicePreview);
  });
}

function renderRxTable() {
  const tbody = document.getElementById('rxTableBody');
  if (!tbody) return;
  tbody.innerHTML = medicines.map((m,i)=>`
    <tr>
      <td><input type="text" value="${m.name}" onchange="medicines[${i}].name=this.value;updateInvoicePreview()" placeholder="Medicine name" /></td>
      <td><input type="text" value="${m.dose}" onchange="medicines[${i}].dose=this.value" placeholder="500mg" style="width:80px" /></td>
      <td><select onchange="medicines[${i}].freq=this.value" style="width:110px">
        <option ${m.freq===''?'selected':''} value="">Select</option>
        <option ${m.freq==='OD'?'selected':''}>OD</option>
        <option ${m.freq==='BD'?'selected':''}>BD</option>
        <option ${m.freq==='TDS'?'selected':''}>TDS</option>
        <option ${m.freq==='QID'?'selected':''}>QID</option>
        <option ${m.freq==='SOS'?'selected':''}>SOS</option>
      </select></td>
      <td><input type="text" value="${m.duration}" onchange="medicines[${i}].duration=this.value" placeholder="5 days" style="width:80px" /></td>
      <td><input type="text" value="${m.instructions}" onchange="medicines[${i}].instructions=this.value" placeholder="After food" /></td>
      <td><button class="btn-del" onclick="removeMedicine(${i})">✕</button></td>
    </tr>
  `).join('');
}

function addMedicineRow() {
  medicines.push({name:'',dose:'',freq:'',duration:'',instructions:''});
  renderRxTable();
}

function removeMedicine(i) {
  medicines.splice(i,1);
  renderRxTable();
}

function updateInvoicePreview() {
  const preview = document.getElementById('invoicePreview');
  if (!preview) return;
  const items = [];
  items.push({ desc:'Consultation Fee', qty:1, rate:CONSULT_FEE });
  medicines.forEach(m=>{ if(m.name) items.push({ desc:'Medicine: '+m.name, qty:1, rate:0 }); });
  const labChecked = LAB_TESTS.filter((_,i)=>document.getElementById('lab-'+i)?.checked);
  labChecked.forEach(t=>items.push({ desc:'Lab: '+t, qty:1, rate:300 }));
  const radChecked = RADIOLOGY.filter((_,i)=>document.getElementById('rad-'+i)?.checked);
  radChecked.forEach(t=>items.push({ desc:'Radiology: '+t, qty:1, rate:800 }));
  const total = items.reduce((s,i)=>s+i.rate,0);
  preview.style.display='block';
  document.getElementById('invItems').innerHTML = items.map(i=>`<div class="inv-row"><span>${i.desc}</span><span>₹${i.rate}</span></div>`).join('') +
    `<div class="inv-row total"><span>Total</span><span>₹${total}</span></div>`;
}

async function saveConsultation() {
  if (!selectedPatient) return;
  const btn = document.getElementById('saveConsultBtn');
  const err = document.getElementById('c-err');
  const succ = document.getElementById('c-succ');
  err.style.display='none'; succ.style.display='none';

  const diagnosis = document.getElementById('c-diag').value.trim();
  if (!diagnosis) { err.textContent='Primary diagnosis is required.'; err.style.display='block'; return; }

  btn.disabled=true; btn.textContent='Saving...';

  try {
    const labChecked = LAB_TESTS.filter((_,i)=>document.getElementById('lab-'+i)?.checked);
    const radChecked = RADIOLOGY.filter((_,i)=>document.getElementById('rad-'+i)?.checked);

    // 1. Save Consultation
    const consRes = await fetch('/api/resource/Consultation', {
      method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
      body: JSON.stringify({
        doctype:'Consultation',
        patient: selectedPatient.name,
        patient_name: selectedPatient.patient_name,
        token_number: selectedPatient.token_number,
        chief_complaint: document.getElementById('c-complaint').value,
        history_of_present_illness: document.getElementById('c-hpi').value,
        diagnosis: diagnosis,
        secondary_diagnosis: document.getElementById('c-diag2').value,
        clinical_notes: document.getElementById('c-notes').value,
        disposition: document.getElementById('c-disp').value,
        follow_up_date: document.getElementById('c-followup').value,
        consultation_date: new Date().toISOString(),
      })
    });
    if (!consRes.ok) { const d=await consRes.json(); throw new Error('Consultation save: '+(d.exc||d._server_messages||'failed')); }
    const consData = await consRes.json();

    // 2. Save Prescription (medicines)
    const validMeds = medicines.filter(m=>m.name.trim());
    if (validMeds.length > 0) {
      const rxRes = await fetch('/api/resource/Prescription', {
        method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
        body: JSON.stringify({
          doctype:'Prescription',
          patient: selectedPatient.name,
          patient_name: selectedPatient.patient_name,
          token_number: selectedPatient.token_number,
          consultation: consData.data?.name,
          medicines: JSON.stringify(validMeds),
          status:'Pending',
          prescribed_date: new Date().toISOString(),
        })
      });
      if (!rxRes.ok) console.warn('Prescription save failed');
    }

    // 3. Lab Requests
    for (const test of labChecked) {
      await fetch('/api/resource/Lab Request', {
        method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
        body: JSON.stringify({ doctype:'Lab Request', patient:selectedPatient.name, patient_name:selectedPatient.patient_name, token_number:selectedPatient.token_number, test_name:test, status:'Pending', requested_by:document.getElementById('staffName').textContent })
      });
    }

    // 4. Radiology Requests
    for (const scan of radChecked) {
      await fetch('/api/resource/Radiology Request', {
        method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
        body: JSON.stringify({ doctype:'Radiology Request', patient:selectedPatient.name, patient_name:selectedPatient.patient_name, token_number:selectedPatient.token_number, scan_type:scan, status:'Pending' })
      });
    }

    // 5. Sales Invoice
    const invItems = [
      { item_code:'Consultation', item_name:'Consultation Fee', qty:1, rate:CONSULT_FEE, amount:CONSULT_FEE }
    ];
    labChecked.forEach(t=>invItems.push({ item_code:'Lab Test', item_name:'Lab: '+t, qty:1, rate:300, amount:300 }));
    radChecked.forEach(t=>invItems.push({ item_code:'Radiology', item_name:'Radiology: '+t, qty:1, rate:800, amount:800 }));
    validMeds.forEach(m=>invItems.push({ item_code:'Medicine', item_name:'Medicine: '+m.name, qty:1, rate:0, amount:0 }));

    const invRes = await fetch('/api/resource/Sales Invoice', {
      method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
      body: JSON.stringify({
        doctype:'Sales Invoice',
        customer: selectedPatient.patient_name,
        patient: selectedPatient.name,
        token_number: selectedPatient.token_number,
        posting_date: new Date().toISOString().split('T')[0],
        due_date: new Date().toISOString().split('T')[0],
        items: invItems,
      })
    });
    if (!invRes.ok) console.warn('Invoice creation failed (item master may not exist — configure in ERPNext)');
    const invData = await invRes.json();
    const invoiceName = invData.data?.name || '—';

    // 6. Update patient status
    await fetch(`/api/resource/Patient Registration/${selectedPatient.name}`, {
      method:'PUT', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
      body: JSON.stringify({ triage_status:'Doctor Seen' })
    });

    const totalAmt = invItems.reduce((s,i)=>s+i.amount,0);
    succ.textContent = `✅ Consultation saved! ${validMeds.length} medicines, ${labChecked.length} lab orders, ${radChecked.length} radiology orders. Invoice: ${invoiceName} (₹${totalAmt})`;
    succ.style.display='block';
    selectedPatient = null;
    setTimeout(()=>{ loadQueue(); document.getElementById('consultPanel').innerHTML='<div class="empty-state"><div style="font-size:3rem">👨‍⚕️</div><div>Select a patient from the queue</div></div>'; }, 2000);

  } catch(e) {
    err.textContent='Error: '+(e.message||String(e)); err.style.display='block'; console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='Save Consultation + Create Prescription + Generate Invoice';
  }
}

checkAuth();
loadQueue();
setInterval(loadQueue, 15000);
</script>
</body>
</html>
