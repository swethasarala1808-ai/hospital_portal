<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Portal — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

  :root {
    --navy: #0a1628;
    --blue: #1a3a6b;
    --accent: #4f8ef7;
    --green: #22c55e;
    --red: #ef4444;
    --white: #f8fafc;
    --muted: #94a3b8;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(79,142,247,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(26,58,107,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(10,22,40,1) 0%, transparent 100%);
    animation: bgShift 8s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(20px,20px) rotate(1deg); }
  }

  /* Floating cross symbols */
  .bg-crosses {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cross {
    position: absolute;
    color: rgba(79,142,247,0.08);
    font-size: 2rem;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), #2563eb);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(79,142,247,0.3);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 32px rgba(79,142,247,0.3); }
    50% { box-shadow: 0 8px 48px rgba(79,142,247,0.5); }
  }

  .logo-area h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .logo-area p {
    color: var(--muted);
    font-size: 0.875rem;
    margin-top: 4px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .card h2 {
    font-size: 1.1rem;
    color: var(--white);
    margin-bottom: 24px;
    font-weight: 500;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
    background: rgba(79,142,247,0.08);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
  }

  input::placeholder { color: rgba(148,163,184,0.5); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #2563eb);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(79,142,247,0.4);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    color: #fca5a5;
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
  }

  .success-msg {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    color: #86efac;
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
  }

  .dept-hint {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .dept-hint p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .dept-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .dept-tag {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dept-tag span { font-size: 0.9rem; }

  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-crosses" id="bgCrosses"></div>

<div class="container">
  <div class="logo-area">
    <div class="logo-icon">🏥</div>
    <h1>MediCare Hospital</h1>
    <p>Integrated Hospital Management System</p>
  </div>

  <div class="card">
    <h2>Sign in to your portal</h2>

    <div class="field">
      <label>Username / Email</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="dept-hint">
      <p>Department Portals</p>
      <div class="dept-grid">
        <div class="dept-tag"><span>📋</span> Registration</div>
        <div class="dept-tag"><span>🩺</span> Nursing</div>
        <div class="dept-tag"><span>👨‍⚕️</span> Doctor OPD</div>
        <div class="dept-tag"><span>🔬</span> Laboratory</div>
        <div class="dept-tag"><span>📡</span> Radiology</div>
        <div class="dept-tag"><span>💊</span> Pharmacy</div>
        <div class="dept-tag"><span>🛏️</span> IPD Ward</div>
        <div class="dept-tag"><span>🚨</span> ICU</div>
      </div>
    </div>
  </div>
</div>

<script>
// Role → Portal routing map
const ROLE_ROUTES = {
  'Administrator':        '/hospital-dashboard',
  'System Manager':       '/hospital-dashboard',
  'Registration Staff':   '/registration-portal',
  'Nurse':                '/nurse-portal',
  'Doctor':               '/doctor-portal',
  'Lab Technician':       '/lab-portal',
  'Radiographer':         '/radiology-portal',
  'Pharmacist':           '/pharmacy-portal',
  'Ward Nurse':           '/ipd-portal',
  'ICU Nurse':            '/icu-portal',
};

// Generate floating crosses
(function() {
  const container = document.getElementById('bgCrosses');
  for (let i = 0; i < 15; i++) {
    const el = document.createElement('div');
    el.className = 'cross';
    el.textContent = '✚';
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    el.style.fontSize = (1 + Math.random() * 2) + 'rem';
    container.appendChild(el);
  }
})();

// Enter key support
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const usr = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value;

  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  if (!usr || !pwd) {
    showError('Please enter username and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Signing in...';

  try {
    // Step 1: Login via Frappe
    const loginRes = await fetch('/api/method/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usr, pwd }),
      credentials: 'include'
    });

    const loginData = await loginRes.json();

    if (!loginRes.ok || loginData.exc) {
      showError('Invalid username or password. Please try again.');
      return;
    }

    // Step 2: Get logged-in user roles
    const roleRes = await fetch('/api/method/frappe.client.get_value?doctype=User&fieldname=["name","full_name","roles"]&filters={"name":"' + encodeURIComponent(loginData.home_page ? usr : usr) + '"}', {
      credentials: 'include'
    });

    // Step 3: Get current user info
    const userRes = await fetch('/api/method/frappe.auth.get_logged_user', {
      credentials: 'include'
    });
    const userData = await userRes.json();
    const currentUser = userData.message;

    // Step 4: Get user roles
    const rolesRes = await fetch(`/api/resource/User/${encodeURIComponent(currentUser)}?fields=["name","full_name","roles"]`, {
      credentials: 'include'
    });
    const rolesData = await rolesRes.json();
    const userRoles = (rolesData.data?.roles || []).map(r => r.role);

    // Step 5: Route based on role
    let targetRoute = null;
    for (const [role, route] of Object.entries(ROLE_ROUTES)) {
      if (userRoles.includes(role)) {
        targetRoute = route;
        break;
      }
    }

    if (!targetRoute) {
      // fallback — check if Administrator
      if (currentUser === 'Administrator' || userRoles.includes('System Manager')) {
        targetRoute = '/hospital-dashboard';
      } else {
        showError('Your account has no department assigned. Contact admin.');
        return;
      }
    }

    successMsg.textContent = `Welcome! Redirecting to your portal...`;
    successMsg.style.display = 'block';

    setTimeout(() => { window.location.href = targetRoute; }, 800);

  } catch (err) {
    showError('Connection error. Is the Frappe server running?');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
