<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#21262d;
    --text:#e6edf3; --muted:#8b949e; --accent:#4f8ef7;
    --green:#3fb950; --red:#f85149; --yellow:#d29922;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar-title { font-weight:600; font-size:1rem; }
  .dept-badge { background:rgba(79,142,247,0.15); color:var(--accent); border:1px solid rgba(79,142,247,0.3); padding:2px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:12px; font-size:0.85rem; color:var(--muted); }
  .btn-sm { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#f85149; padding:5px 12px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.78rem; }
  .btn-sm:hover { background:rgba(248,81,73,0.2); }

  .main { display:grid; grid-template-columns:1fr 380px; gap:20px; padding:24px; max-width:1300px; margin:0 auto; }

  /* Form panel */
  .form-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .panel-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .panel-header h2 { font-size:1rem; font-weight:600; }
  .panel-body { padding:24px; }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-grid .full { grid-column:1/-1; }
  .field label { display:block; font-size:0.75rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px; font-weight:500; }
  .field input, .field select, .field textarea {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:9px; padding:10px 13px; color:var(--text); font-family:inherit;
    font-size:0.9rem; outline:none; transition:all 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color:var(--accent); background:rgba(79,142,247,0.05);
  }
  .field textarea { resize:vertical; min-height:70px; }
  .field select option { background:#1a1f2e; }
  input::placeholder, textarea::placeholder { color:rgba(139,148,158,0.5); }

  .section-divider { grid-column:1/-1; font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; padding-top:8px; border-top:1px solid var(--border); margin-top:4px; }

  .btn-primary {
    background:linear-gradient(135deg,#4f8ef7,#2563eb); border:none; border-radius:10px;
    color:white; padding:12px 24px; font-family:inherit; font-size:0.95rem; font-weight:600;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(79,142,247,0.3);
    width:100%; margin-top:4px;
  }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,142,247,0.4); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .msg { padding:10px 14px; border-radius:9px; font-size:0.85rem; margin-top:12px; display:none; }
  .msg.error { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#fca5a5; }
  .msg.success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#86efac; }

  /* Right panel */
  .right-col { display:flex; flex-direction:column; gap:16px; }

  /* Token display */
  .token-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px;
    text-align:center; display:none;
  }
  .token-card.show { display:block; }
  .token-label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .token-number {
    font-size:3rem; font-weight:700; color:var(--accent); letter-spacing:2px;
    background:rgba(79,142,247,0.08); border:2px dashed rgba(79,142,247,0.3);
    border-radius:12px; padding:12px 20px; margin:8px 0;
  }
  .token-patient { font-size:0.9rem; color:var(--muted); }
  .token-patient strong { color:var(--text); }
  .btn-print { background:rgba(79,142,247,0.1); border:1px solid rgba(79,142,247,0.3); color:var(--accent); padding:8px 20px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:0.85rem; margin-top:10px; width:100%; }

  /* Queue panel */
  .queue-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; flex:1; }
  .queue-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .queue-header h3 { font-size:0.9rem; font-weight:600; }
  .queue-count { background:rgba(79,142,247,0.15); color:var(--accent); padding:2px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .queue-list { max-height:400px; overflow-y:auto; }
  .queue-item { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-size:0.85rem; }
  .queue-item:last-child { border-bottom:none; }
  .q-token { font-weight:700; color:var(--accent); width:50px; }
  .q-info { flex:1; }
  .q-name { font-weight:500; }
  .q-detail { font-size:0.75rem; color:var(--muted); }
  .q-status { font-size:0.72rem; padding:2px 8px; border-radius:20px; }
  .q-status.pending { background:rgba(79,142,247,0.15); color:var(--accent); }
  .q-status.vitals { background:rgba(63,185,80,0.15); color:var(--green); }
  .q-status.seen { background:rgba(163,113,247,0.15); color:#a371f7; }

  @media (max-width:900px) {
    .main { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:1.2rem">📋</span>
    <span class="topbar-title">Registration / Front Office</span>
    <span class="dept-badge">Registration Staff</span>
  </div>
  <div class="topbar-right">
    <span id="staffName">Loading...</span>
    <button class="btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <!-- Registration Form -->
  <div class="form-panel">
    <div class="panel-header">
      <span style="font-size:1.2rem">➕</span>
      <h2>Register New Patient</h2>
    </div>
    <div class="panel-body">
      <div class="form-grid">

        <div class="section-divider">Personal Information</div>

        <div class="field">
          <label>First Name *</label>
          <input type="text" id="firstName" placeholder="First name" />
        </div>
        <div class="field">
          <label>Last Name *</label>
          <input type="text" id="lastName" placeholder="Last name" />
        </div>
        <div class="field">
          <label>Date of Birth *</label>
          <input type="date" id="dob" />
        </div>
        <div class="field">
          <label>Gender *</label>
          <select id="gender">
            <option value="">Select</option>
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Blood Group</label>
          <select id="bloodGroup">
            <option value="">Unknown</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="field">
          <label>Phone *</label>
          <input type="tel" id="phone" placeholder="10-digit mobile" />
        </div>

        <div class="section-divider">Visit Details</div>

        <div class="field">
          <label>Visit Type *</label>
          <select id="visitType">
            <option value="">Select</option>
            <option>OPD</option><option>Emergency</option><option>Follow-up</option><option>IPD Referral</option>
          </select>
        </div>
        <div class="field">
          <label>Department</label>
          <select id="dept">
            <option value="">General</option>
            <option>General Medicine</option><option>Cardiology</option><option>Orthopaedics</option>
            <option>Gynaecology</option><option>Paediatrics</option><option>Neurology</option>
            <option>ENT</option><option>Ophthalmology</option>
          </select>
        </div>
        <div class="field full">
          <label>Chief Complaint *</label>
          <textarea id="complaint" placeholder="Describe the patient's main complaint..."></textarea>
        </div>

        <div class="section-divider">Address & Emergency Contact</div>

        <div class="field full">
          <label>Address</label>
          <input type="text" id="address" placeholder="Full address" />
        </div>
        <div class="field">
          <label>Emergency Contact Name</label>
          <input type="text" id="emergName" placeholder="Name" />
        </div>
        <div class="field">
          <label>Emergency Contact Phone</label>
          <input type="tel" id="emergPhone" placeholder="Phone" />
        </div>

        <div class="full">
          <button class="btn-primary" id="regBtn" onclick="registerPatient()">
            Register Patient &amp; Generate Token
          </button>
          <div class="msg error" id="errMsg"></div>
          <div class="msg success" id="succMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div class="right-col">

    <!-- Token card (appears after registration) -->
    <div class="token-card" id="tokenCard">
      <div class="token-label">Token Generated</div>
      <div class="token-number" id="tokenNum">—</div>
      <div class="token-patient">
        <strong id="tokenPatient">—</strong><br>
        <span id="tokenId" style="font-size:0.75rem;color:var(--muted)"></span>
      </div>
      <button class="btn-print" onclick="printToken()">🖨️ Print Token</button>
    </div>

    <!-- Today's queue -->
    <div class="queue-card">
      <div class="queue-header">
        <h3>Today's Queue</h3>
        <span class="queue-count" id="queueCount">0</span>
      </div>
      <div class="queue-list" id="queueList">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Loading queue...</div>
      </div>
    </div>
  </div>
</div>

<script>
// Auth guard - only Registration Staff
async function checkAuth() {
  try {
    const res = await fetch('/api/method/frappe.auth.get_logged_user', {credentials:'include'});
    const data = await res.json();
    const user = data.message;
    if (!user || user==='Guest') { window.location.href='/login'; return; }
    document.getElementById('staffName').textContent = user;

    const roleRes = await fetch(`/api/resource/User/${encodeURIComponent(user)}?fields=["roles"]`, {credentials:'include'});
    const roleData = await roleRes.json();
    const roles = (roleData.data?.roles||[]).map(r=>r.role);
    const allowed = roles.some(r=>['Registration Staff','System Manager','Administrator'].includes(r));
    if (!allowed) { alert('Access denied. You are not Registration Staff.'); window.location.href='/login'; }
  } catch(e) { window.location.href='/login'; }
}

function getCsrf() {
  const m = document.cookie.split(';').map(c=>c.trim().split('=')).find(c=>c[0]==='csrf_token');
  return m?m[1]:'';
}

function doLogout() {
  fetch('/api/method/logout',{credentials:'include'}).then(()=>{ window.location.href='/login'; });
}

// Generate token number (sequential for today)
async function getNextToken() {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(`/api/resource/Patient Registration?fields=["token_number"]&filters=[["creation",">=","${today} 00:00:00"]]&limit=500&order_by=creation desc`, {credentials:'include'});
  const data = await res.json();
  const existing = (data.data||[]).map(r=>parseInt(r.token_number||0)).filter(n=>!isNaN(n));
  return existing.length > 0 ? Math.max(...existing) + 1 : 1;
}

async function registerPatient() {
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('errMsg');
  const succ = document.getElementById('succMsg');
  err.style.display='none'; succ.style.display='none';

  const firstName = document.getElementById('firstName').value.trim();
  const lastName  = document.getElementById('lastName').value.trim();
  const dob       = document.getElementById('dob').value;
  const gender    = document.getElementById('gender').value;
  const phone     = document.getElementById('phone').value.trim();
  const visitType = document.getElementById('visitType').value;
  const complaint = document.getElementById('complaint').value.trim();

  if (!firstName||!lastName||!dob||!gender||!phone||!visitType||!complaint) {
    err.textContent='Please fill all required fields (*)'; err.style.display='block'; return;
  }

  btn.disabled=true; btn.textContent='Registering...';

  try {
    const token = await getNextToken();
    const patientName = firstName + ' ' + lastName;
    const today = new Date().toISOString().split('T')[0].replace(/-/g,'');

    const body = {
      doctype: 'Patient Registration',
      patient_name: patientName,
      first_name: firstName,
      last_name: lastName,
      date_of_birth: dob,
      gender: gender,
      blood_group: document.getElementById('bloodGroup').value,
      phone: phone,
      visit_type: visitType,
      department: document.getElementById('dept').value,
      chief_complaint: complaint,
      address: document.getElementById('address').value,
      emergency_contact_name: document.getElementById('emergName').value,
      emergency_contact_phone: document.getElementById('emergPhone').value,
      triage_status: 'Pending',
      token_number: String(token).padStart(3,'0'),
      registration_date: new Date().toISOString().split('T')[0],
    };

    const res = await fetch('/api/resource/Patient Registration', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'X-Frappe-CSRF-Token': getCsrf() },
      credentials:'include',
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok || data.exc) {
      throw new Error(data.exc || data._server_messages || 'Registration failed');
    }

    const saved = data.data;

    // Show token
    document.getElementById('tokenNum').textContent = String(token).padStart(3,'0');
    document.getElementById('tokenPatient').textContent = patientName;
    document.getElementById('tokenId').textContent = saved.name;
    document.getElementById('tokenCard').classList.add('show');

    succ.textContent = `✅ Patient registered! Token: ${String(token).padStart(3,'0')} | ID: ${saved.name}`;
    succ.style.display='block';

    // Clear form
    ['firstName','lastName','dob','phone','complaint','address','emergName','emergPhone'].forEach(id=>{ document.getElementById(id).value=''; });
    ['gender','bloodGroup','visitType','dept'].forEach(id=>{ document.getElementById(id).value=''; });

    loadQueue();
  } catch(e) {
    err.textContent = 'Error: ' + (e.message||String(e));
    err.style.display='block';
    console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='Register Patient & Generate Token';
  }
}

async function loadQueue() {
  const today = new Date().toISOString().split('T')[0];
  try {
    const res = await fetch(`/api/resource/Patient Registration?fields=["name","patient_name","token_number","triage_status","visit_type","chief_complaint"]&filters=[["creation",">=","${today} 00:00:00"]]&order_by=token_number asc&limit=50`, {credentials:'include'});
    const data = await res.json();
    const list = data.data || [];
    document.getElementById('queueCount').textContent = list.length;

    if (!list.length) {
      document.getElementById('queueList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">No patients today yet.</div>';
      return;
    }

    const statusClass = {Pending:'pending','Vitals Recorded':'vitals','Doctor Seen':'seen','Completed':'seen'};
    document.getElementById('queueList').innerHTML = list.map(p=>`
      <div class="queue-item">
        <div class="q-token">${p.token_number||'—'}</div>
        <div class="q-info">
          <div class="q-name">${p.patient_name||'—'}</div>
          <div class="q-detail">${p.visit_type||'OPD'} · ${(p.chief_complaint||'').substring(0,30)}</div>
        </div>
        <span class="q-status ${statusClass[p.triage_status]||'pending'}">${p.triage_status||'Pending'}</span>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('queueList').innerHTML = '<div style="padding:16px;color:var(--muted);font-size:0.85rem">Error loading queue.</div>';
  }
}

function printToken() {
  const num = document.getElementById('tokenNum').textContent;
  const name = document.getElementById('tokenPatient').textContent;
  const id = document.getElementById('tokenId').textContent;
  const now = new Date().toLocaleString('en-IN');
  const w = window.open('','_blank','width=300,height=400');
  w.document.write(`
    <html><head><title>Token</title>
    <style>body{font-family:monospace;text-align:center;padding:20px}
    .tok{font-size:48px;font-weight:bold;border:3px dashed #333;padding:12px 24px;display:inline-block;margin:12px 0}
    </style></head><body>
    <h2>🏥 Medicare Hospital</h2>
    <p>Registration Token</p>
    <div class="tok">${num}</div>
    <p><strong>${name}</strong></p>
    <p style="font-size:12px">${id}</p>
    <p style="font-size:11px">${now}</p>
    <p style="font-size:11px;margin-top:12px">Please proceed to Nursing / Triage</p>
    <script>window.print();setTimeout(()=>window.close(),1000)<\/script>
    </body></html>
  `);
}

checkAuth();
loadQueue();
setInterval(loadQueue, 20000);
</script>
</body>
</html>
