<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing / Triage Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
  :root { --bg:#0d1117; --surface:#161b22; --border:#21262d; --text:#e6edf3; --muted:#8b949e; --accent:#3fb950; --blue:#4f8ef7; --red:#f85149; --yellow:#d29922; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar-title { font-weight:600; }
  .dept-badge { background:rgba(63,185,80,0.15); color:var(--accent); border:1px solid rgba(63,185,80,0.3); padding:2px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:12px; font-size:0.85rem; color:var(--muted); }
  .btn-sm { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#f85149; padding:5px 12px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.78rem; }

  .main { display:grid; grid-template-columns:320px 1fr; gap:20px; padding:24px; max-width:1300px; margin:0 auto; }

  /* Queue list */
  .queue-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-header h2 { font-size:0.9rem; font-weight:600; }
  .count-badge { background:rgba(63,185,80,0.15); color:var(--accent); padding:2px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .patient-list { overflow-y:auto; max-height:calc(100vh - 160px); }
  .patient-item {
    padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s;
    display:flex; align-items:center; gap:12px;
  }
  .patient-item:hover { background:rgba(255,255,255,0.03); }
  .patient-item.active { background:rgba(63,185,80,0.08); border-left:3px solid var(--accent); }
  .p-token { font-size:1.2rem; font-weight:700; color:var(--accent); min-width:40px; }
  .p-info { flex:1; }
  .p-name { font-weight:500; font-size:0.9rem; }
  .p-detail { font-size:0.75rem; color:var(--muted); }
  .p-status { font-size:0.68rem; padding:2px 6px; border-radius:10px; background:rgba(79,142,247,0.15); color:var(--blue); }

  /* Vitals form */
  .vitals-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--muted); }
  .empty-state .icon { font-size:3rem; margin-bottom:12px; }

  .patient-header { padding:18px 24px; border-bottom:1px solid var(--border); background:rgba(63,185,80,0.05); }
  .patient-header h2 { font-size:1.1rem; font-weight:600; }
  .patient-meta { display:flex; gap:16px; margin-top:6px; font-size:0.8rem; color:var(--muted); }
  .patient-meta span { display:flex; align-items:center; gap:4px; }

  .vitals-body { padding:24px; }
  .vitals-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
  .field label { display:block; font-size:0.73rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.4px; font-weight:500; }
  .field input, .field select, .field textarea {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:9px; padding:10px 13px; color:var(--text); font-family:inherit;
    font-size:0.9rem; outline:none; transition:all 0.2s;
  }
  .field input:focus, .field select:focus { border-color:var(--accent); background:rgba(63,185,80,0.05); }
  .field textarea { resize:vertical; min-height:60px; }

  .vital-card {
    background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px;
    padding:14px; text-align:center; position:relative;
  }
  .vital-card label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
  .vital-card input {
    background:transparent; border:none; border-bottom:1px solid var(--border); border-radius:0;
    padding:4px 0; text-align:center; font-size:1.2rem; font-weight:600; color:var(--text);
    width:100%;
  }
  .vital-card input:focus { border-bottom-color:var(--accent); outline:none; }
  .vital-card .unit { font-size:0.7rem; color:var(--muted); margin-top:4px; }

  .section-title { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }

  .triage-levels { display:flex; gap:8px; margin-bottom:20px; }
  .triage-btn { flex:1; padding:10px; border:1px solid var(--border); border-radius:9px; cursor:pointer; font-family:inherit; font-size:0.8rem; font-weight:600; background:transparent; color:var(--muted); transition:all 0.2s; }
  .triage-btn:hover { border-color:currentColor; }
  .triage-btn.selected { color:white; }
  .triage-btn[data-level="1"] { --c:#f85149; }
  .triage-btn[data-level="2"] { --c:#f0883e; }
  .triage-btn[data-level="3"] { --c:#d29922; }
  .triage-btn[data-level="4"] { --c:#3fb950; }
  .triage-btn[data-level="5"] { --c:#4f8ef7; }
  .triage-btn.selected { background:var(--c); border-color:var(--c); color:white; }

  .btn-primary { background:linear-gradient(135deg,#3fb950,#16a34a); border:none; border-radius:10px; color:white; padding:12px 24px; font-family:inherit; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(63,185,80,0.25); width:100%; margin-top:4px; }
  .btn-primary:hover { transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .msg { padding:10px 14px; border-radius:9px; font-size:0.85rem; margin-top:10px; display:none; }
  .msg.error { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#fca5a5; }
  .msg.success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#86efac; }

  @media(max-width:900px) { .main { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:1.2rem">🩺</span>
    <span class="topbar-title">Nursing / Triage</span>
    <span class="dept-badge">Nurse</span>
  </div>
  <div class="topbar-right">
    <span id="staffName">Loading...</span>
    <button class="btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <!-- Patient queue -->
  <div class="queue-panel">
    <div class="panel-header">
      <h2>Pending Patients</h2>
      <span class="count-badge" id="queueCount">0</span>
    </div>
    <div class="patient-list" id="patientList">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Loading queue...</div>
    </div>
  </div>

  <!-- Vitals form -->
  <div class="vitals-panel" id="vitalsPanel">
    <div class="empty-state">
      <div class="icon">🩺</div>
      <div>Select a patient from the queue to record vitals</div>
    </div>
  </div>
</div>

<script>
let selectedPatient = null;
let selectedTriage = null;

async function checkAuth() {
  try {
    const res = await fetch('/api/method/frappe.auth.get_logged_user', {credentials:'include'});
    const data = await res.json();
    const user = data.message;
    if (!user||user==='Guest') { window.location.href='/login'; return; }
    document.getElementById('staffName').textContent = user;
    const roleRes = await fetch(`/api/resource/User/${encodeURIComponent(user)}?fields=["roles"]`, {credentials:'include'});
    const roleData = await roleRes.json();
    const roles = (roleData.data?.roles||[]).map(r=>r.role);
    if (!roles.some(r=>['Nurse','System Manager','Administrator'].includes(r))) {
      alert('Access denied.'); window.location.href='/login';
    }
  } catch(e) { window.location.href='/login'; }
}

function getCsrf() {
  const m = document.cookie.split(';').map(c=>c.trim().split('=')).find(c=>c[0]==='csrf_token');
  return m?m[1]:'';
}
function doLogout() { fetch('/api/method/logout',{credentials:'include'}).then(()=>{ window.location.href='/login'; }); }

async function loadQueue() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(`/api/resource/Patient Registration?fields=["name","patient_name","token_number","triage_status","visit_type","chief_complaint","date_of_birth","gender","phone"]&filters=[["creation",">=","${today} 00:00:00"],["triage_status","in","Pending,Vitals Recorded"]]&order_by=token_number asc&limit=50`, {credentials:'include'});
    const data = await res.json();
    const list = data.data || [];
    const pending = list.filter(p=>p.triage_status==='Pending');
    document.getElementById('queueCount').textContent = pending.length;

    if (!list.length) {
      document.getElementById('patientList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Queue is empty ✓</div>';
      return;
    }

    document.getElementById('patientList').innerHTML = list.map(p=>`
      <div class="patient-item ${selectedPatient?.name===p.name?'active':''}" onclick="selectPatient(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="p-token">${p.token_number||'—'}</div>
        <div class="p-info">
          <div class="p-name">${p.patient_name}</div>
          <div class="p-detail">${p.visit_type||'OPD'} · ${(p.chief_complaint||'').substring(0,28)}</div>
        </div>
        <span class="p-status">${p.triage_status==='Pending'?'Waiting':'Done'}</span>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

function selectPatient(p) {
  selectedPatient = p;
  selectedTriage = null;
  loadQueue();

  // Calculate age
  const age = p.date_of_birth ? Math.floor((Date.now()-new Date(p.date_of_birth))/(365.25*24*3600*1000)) : '—';

  document.getElementById('vitalsPanel').innerHTML = `
    <div class="patient-header">
      <h2>${p.patient_name} <span style="font-size:0.8rem;color:var(--muted);font-weight:400">(Token: ${p.token_number||p.name})</span></h2>
      <div class="patient-meta">
        <span>🪪 ${p.name}</span>
        <span>🎂 ${age} yrs</span>
        <span>⚧ ${p.gender||'—'}</span>
        <span>📞 ${p.phone||'—'}</span>
        <span>🏥 ${p.visit_type||'OPD'}</span>
      </div>
    </div>
    <div class="vitals-body">

      <div class="section-title">Vital Signs</div>
      <div class="vitals-grid">
        <div class="vital-card"><label>Temperature</label><input type="number" id="v-temp" placeholder="98.6" step="0.1"><div class="unit">°F</div></div>
        <div class="vital-card"><label>BP Systolic</label><input type="number" id="v-bps" placeholder="120"><div class="unit">mmHg</div></div>
        <div class="vital-card"><label>BP Diastolic</label><input type="number" id="v-bpd" placeholder="80"><div class="unit">mmHg</div></div>
        <div class="vital-card"><label>Pulse Rate</label><input type="number" id="v-pulse" placeholder="72"><div class="unit">bpm</div></div>
        <div class="vital-card"><label>SpO2</label><input type="number" id="v-spo2" placeholder="98"><div class="unit">%</div></div>
        <div class="vital-card"><label>Resp. Rate</label><input type="number" id="v-resp" placeholder="16"><div class="unit">breaths/min</div></div>
        <div class="vital-card"><label>Weight</label><input type="number" id="v-wt" placeholder="70" step="0.1"><div class="unit">kg</div></div>
        <div class="vital-card"><label>Height</label><input type="number" id="v-ht" placeholder="170"><div class="unit">cm</div></div>
        <div class="vital-card"><label>Blood Sugar</label><input type="number" id="v-sugar" placeholder="90"><div class="unit">mg/dL</div></div>
      </div>

      <div class="section-title">Triage Level</div>
      <div class="triage-levels">
        <button class="triage-btn" data-level="1" onclick="setTriage(1)">🔴 1<br>Critical</button>
        <button class="triage-btn" data-level="2" onclick="setTriage(2)">🟠 2<br>Emergent</button>
        <button class="triage-btn" data-level="3" onclick="setTriage(3)">🟡 3<br>Urgent</button>
        <button class="triage-btn" data-level="4" onclick="setTriage(4)">🟢 4<br>Less Urgent</button>
        <button class="triage-btn" data-level="5" onclick="setTriage(5)">🔵 5<br>Non-Urgent</button>
      </div>

      <div class="section-title">Nursing Notes</div>
      <div class="field" style="margin-bottom:16px">
        <label>Observations / Chief Complaint</label>
        <textarea id="v-notes" placeholder="Patient complaints, initial observations...">${p.chief_complaint||''}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div class="field">
          <label>Pain Scale (0–10)</label>
          <input type="number" id="v-pain" min="0" max="10" placeholder="0–10">
        </div>
        <div class="field">
          <label>Allergy</label>
          <input type="text" id="v-allergy" placeholder="Known allergies">
        </div>
      </div>

      <button class="btn-primary" id="saveVitalsBtn" onclick="saveVitals()">Save Vitals &amp; Send to Doctor Queue</button>
      <div class="msg error" id="v-err"></div>
      <div class="msg success" id="v-succ"></div>
    </div>
  `;
}

function setTriage(level) {
  selectedTriage = level;
  document.querySelectorAll('.triage-btn').forEach(b=>{
    b.classList.toggle('selected', parseInt(b.dataset.level)===level);
  });
}

async function saveVitals() {
  if (!selectedPatient) return;
  const btn = document.getElementById('saveVitalsBtn');
  const err = document.getElementById('v-err');
  const succ = document.getElementById('v-succ');
  err.style.display='none'; succ.style.display='none';

  const temp = document.getElementById('v-temp').value;
  const pulse = document.getElementById('v-pulse').value;
  if (!temp||!pulse) { err.textContent='Temperature and Pulse are required.'; err.style.display='block'; return; }
  if (!selectedTriage) { err.textContent='Please assign a triage level.'; err.style.display='block'; return; }

  btn.disabled=true; btn.textContent='Saving...';
  try {
    // Save Vital Signs doctype
    const vsRes = await fetch('/api/resource/Vital Signs', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()},
      credentials:'include',
      body: JSON.stringify({
        doctype:'Vital Signs',
        patient: selectedPatient.name,
        patient_name: selectedPatient.patient_name,
        token_number: selectedPatient.token_number,
        temperature: temp,
        bp_systolic: document.getElementById('v-bps').value,
        bp_diastolic: document.getElementById('v-bpd').value,
        pulse_rate: pulse,
        spo2: document.getElementById('v-spo2').value,
        respiratory_rate: document.getElementById('v-resp').value,
        weight: document.getElementById('v-wt').value,
        height: document.getElementById('v-ht').value,
        blood_sugar: document.getElementById('v-sugar').value,
        triage_level: selectedTriage,
        nursing_notes: document.getElementById('v-notes').value,
        pain_scale: document.getElementById('v-pain').value,
        allergy: document.getElementById('v-allergy').value,
        recorded_at: new Date().toISOString(),
      })
    });
    if (!vsRes.ok) { const d=await vsRes.json(); throw new Error(d.exc||'Failed to save vitals'); }

    // Update Patient Registration triage_status
    const upd = await fetch(`/api/resource/Patient Registration/${selectedPatient.name}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()},
      credentials:'include',
      body: JSON.stringify({ triage_status:'Vitals Recorded', triage_level: selectedTriage })
    });
    if (!upd.ok) throw new Error('Failed to update patient status');

    succ.textContent = `✅ Vitals saved! ${selectedPatient.patient_name} moved to Doctor queue.`;
    succ.style.display='block';
    selectedPatient = null;
    setTimeout(()=>{ loadQueue(); document.getElementById('vitalsPanel').innerHTML='<div class="empty-state"><div class="icon">🩺</div><div>Select a patient from the queue to record vitals</div></div>'; }, 1500);
  } catch(e) {
    err.textContent='Error: '+(e.message||String(e)); err.style.display='block'; console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='Save Vitals & Send to Doctor Queue';
  }
}

checkAuth();
loadQueue();
setInterval(loadQueue, 15000);
</script>
</body>
</html>
