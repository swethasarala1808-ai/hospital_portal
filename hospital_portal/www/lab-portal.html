<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratory Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');
  :root { --bg:#0d1117; --surface:#161b22; --border:#21262d; --text:#e6edf3; --muted:#8b949e; --accent:#f0883e; --green:#3fb950; --red:#f85149; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar-title { font-weight:600; }
  .dept-badge { background:rgba(240,136,62,0.15); color:var(--accent); border:1px solid rgba(240,136,62,0.3); padding:2px 10px; border-radius:20px; font-size:0.72rem; font-weight:600; }
  .topbar-right { display:flex; align-items:center; gap:12px; font-size:0.85rem; color:var(--muted); }
  .btn-sm { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#f85149; padding:5px 12px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.78rem; }
  .main { display:grid; grid-template-columns:300px 1fr; gap:20px; padding:24px; max-width:1300px; margin:0 auto; }
  .queue-panel,.report-panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .queue-panel { height:fit-content; position:sticky; top:76px; }
  .panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-header h2 { font-size:0.9rem; font-weight:600; }
  .count-badge { background:rgba(240,136,62,0.15); color:var(--accent); padding:2px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .patient-list { overflow-y:auto; max-height:500px; }
  .patient-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .patient-item:hover { background:rgba(255,255,255,0.03); }
  .patient-item.active { background:rgba(240,136,62,0.08); border-left:3px solid var(--accent); }
  .p-token { font-size:0.8rem; font-weight:700; color:var(--accent); }
  .p-name { font-weight:500; font-size:0.88rem; margin-top:2px; }
  .p-detail { font-size:0.73rem; color:var(--muted); }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; color:var(--muted); }
  .report-header { padding:18px 24px; border-bottom:1px solid var(--border); }
  .report-header h2 { font-size:1.1rem; font-weight:600; }
  .report-meta { display:flex; gap:12px; margin-top:6px; font-size:0.8rem; color:var(--muted); flex-wrap:wrap; }
  .meta-tag { background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }
  .report-body { padding:24px; }
  .section-title { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .test-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
  .test-name { font-weight:600; font-size:0.9rem; margin-bottom:10px; color:var(--accent); }
  .result-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .field label { display:block; font-size:0.72rem; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.4px; }
  .field input,.field select,.field textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:inherit; font-size:0.88rem; outline:none; transition:all 0.2s; }
  .field input:focus { border-color:var(--accent); }
  .field textarea { resize:vertical; min-height:60px; }
  .normal-range { font-size:0.7rem; color:var(--muted); margin-top:3px; }
  .flag { font-size:0.7rem; padding:1px 6px; border-radius:4px; margin-left:4px; }
  .flag.high { background:rgba(248,81,73,0.2); color:#f85149; }
  .flag.low { background:rgba(79,142,247,0.2); color:#4f8ef7; }
  .flag.normal { background:rgba(63,185,80,0.2); color:#3fb950; }
  .btn-primary { background:linear-gradient(135deg,#f0883e,#c2410c); border:none; border-radius:10px; color:white; padding:12px 24px; font-family:inherit; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 14px rgba(240,136,62,0.25); width:100%; margin-top:4px; }
  .btn-primary:hover { transform:translateY(-1px); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .msg { padding:10px 14px; border-radius:9px; font-size:0.85rem; margin-top:10px; display:none; }
  .msg.error { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:#fca5a5; }
  .msg.success { background:rgba(63,185,80,0.1); border:1px solid rgba(63,185,80,0.3); color:#86efac; }
  @media(max-width:900px) { .main { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:1.2rem">🔬</span>
    <span class="topbar-title">Laboratory</span>
    <span class="dept-badge">Lab Technician</span>
  </div>
  <div class="topbar-right">
    <span id="staffName">Loading...</span>
    <button class="btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div class="main">
  <div class="queue-panel">
    <div class="panel-header">
      <h2>Lab Requests</h2>
      <span class="count-badge" id="queueCount">0</span>
    </div>
    <div class="patient-list" id="reqList">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Loading...</div>
    </div>
  </div>

  <div class="report-panel" id="reportPanel">
    <div class="empty-state">
      <div style="font-size:3rem">🔬</div>
      <div>Select a lab request to enter results</div>
    </div>
  </div>
</div>

<script>
// Common test parameters
const TEST_PARAMS = {
  'CBC (Complete Blood Count)': [
    {name:'Haemoglobin',unit:'g/dL',normal:'M:13-17, F:12-15'},
    {name:'WBC Count',unit:'×10³/μL',normal:'4.5-11.0'},
    {name:'Platelet Count',unit:'×10³/μL',normal:'150-400'},
    {name:'RBC Count',unit:'×10⁶/μL',normal:'M:4.5-5.5, F:4.0-5.0'},
    {name:'Haematocrit',unit:'%',normal:'M:40-52, F:36-48'},
  ],
  'Blood Sugar (Fasting)': [{name:'Glucose (Fasting)',unit:'mg/dL',normal:'70-100'}],
  'Blood Sugar (Random)': [{name:'Glucose (Random)',unit:'mg/dL',normal:'<140'}],
  'HbA1c': [{name:'HbA1c',unit:'%',normal:'<5.7 (Normal), 5.7-6.4 (Pre-DM)'}],
  'Lipid Profile': [
    {name:'Total Cholesterol',unit:'mg/dL',normal:'<200'},
    {name:'HDL',unit:'mg/dL',normal:'>40 M, >50 F'},
    {name:'LDL',unit:'mg/dL',normal:'<100'},
    {name:'Triglycerides',unit:'mg/dL',normal:'<150'},
  ],
  'Liver Function Test': [
    {name:'Total Bilirubin',unit:'mg/dL',normal:'0.2-1.2'},
    {name:'SGOT (AST)',unit:'U/L',normal:'10-40'},
    {name:'SGPT (ALT)',unit:'U/L',normal:'7-56'},
    {name:'Alkaline Phosphatase',unit:'U/L',normal:'44-147'},
  ],
  'Kidney Function Test': [
    {name:'Creatinine',unit:'mg/dL',normal:'M:0.7-1.3, F:0.6-1.1'},
    {name:'Urea (BUN)',unit:'mg/dL',normal:'7-20'},
    {name:'Uric Acid',unit:'mg/dL',normal:'M:3.4-7.0, F:2.4-6.0'},
  ],
  'Thyroid Profile': [
    {name:'TSH',unit:'μIU/mL',normal:'0.4-4.0'},
    {name:'T3',unit:'ng/dL',normal:'80-200'},
    {name:'T4',unit:'μg/dL',normal:'5.0-12.0'},
  ],
};

let selectedReq = null;

async function checkAuth() {
  try {
    const res = await fetch('/api/method/frappe.auth.get_logged_user',{credentials:'include'});
    const data = await res.json();
    const user = data.message;
    if (!user||user==='Guest') { window.location.href='/login'; return; }
    document.getElementById('staffName').textContent = user;
    const roleRes = await fetch(`/api/resource/User/${encodeURIComponent(user)}?fields=["roles"]`,{credentials:'include'});
    const roleData = await roleRes.json();
    const roles = (roleData.data?.roles||[]).map(r=>r.role);
    if (!roles.some(r=>['Lab Technician','System Manager','Administrator'].includes(r))) {
      alert('Access denied.'); window.location.href='/login';
    }
  } catch(e) { window.location.href='/login'; }
}
function getCsrf() { const m=document.cookie.split(';').map(c=>c.trim().split('=')).find(c=>c[0]==='csrf_token'); return m?m[1]:''; }
function doLogout() { fetch('/api/method/logout',{credentials:'include'}).then(()=>{ window.location.href='/login'; }); }

async function loadQueue() {
  try {
    const res = await fetch(`/api/resource/Lab Request?fields=["name","patient","patient_name","token_number","test_name","status"]&filters=[["status","=","Pending"]]&order_by=creation asc&limit=50`,{credentials:'include'});
    const data = await res.json();
    const list = data.data||[];
    document.getElementById('queueCount').textContent = list.length;
    if (!list.length) {
      document.getElementById('reqList').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">No pending requests ✓</div>';
      return;
    }
    document.getElementById('reqList').innerHTML = list.map(r=>`
      <div class="patient-item ${selectedReq?.name===r.name?'active':''}" onclick='selectReq(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
        <div class="p-token">Token: ${r.token_number||'—'}</div>
        <div class="p-name">${r.patient_name}</div>
        <div class="p-detail">${r.test_name}</div>
      </div>`).join('');
  } catch(e) { console.error(e); }
}

function selectReq(req) {
  selectedReq = req;
  loadQueue();
  const params = TEST_PARAMS[req.test_name] || [{name:'Result',unit:'',normal:''}];

  document.getElementById('reportPanel').innerHTML = `
    <div class="report-header">
      <h2>${req.patient_name} — ${req.test_name}</h2>
      <div class="report-meta">
        <span class="meta-tag">🪪 ${req.patient}</span>
        <span class="meta-tag">Token: ${req.token_number||'—'}</span>
        <span class="meta-tag">Request: ${req.name}</span>
      </div>
    </div>
    <div class="report-body">
      <div class="section-title">Test Results</div>
      <div class="test-card">
        <div class="test-name">${req.test_name}</div>
        <div class="result-grid">
          ${params.map((p,i)=>`
            <div>
              <div class="field">
                <label>${p.name} ${p.unit?`(${p.unit})`:''}</label>
                <input type="text" id="param-${i}" placeholder="Enter value" oninput="checkFlag(${i},'${p.name}')" />
                <div class="normal-range">Normal: ${p.normal} <span id="flag-${i}"></span></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section-title">Lab Technician Notes</div>
      <div class="field" style="margin-bottom:16px">
        <label>Remarks / Interpretation</label>
        <textarea id="lab-notes" placeholder="Any remarks, abnormal findings, interpretation..."></textarea>
      </div>
      <div class="field" style="margin-bottom:16px">
        <label>Sample Type</label>
        <select id="sample-type">
          <option>Venous Blood</option><option>Capillary Blood</option><option>Urine</option><option>Stool</option><option>Sputum</option><option>Swab</option>
        </select>
      </div>

      <button class="btn-primary" id="saveReportBtn" onclick="saveReport()">Save Report &amp; Mark Completed</button>
      <div class="msg error" id="r-err"></div>
      <div class="msg success" id="r-succ"></div>
    </div>
  `;
  window._labParams = params;
}

function checkFlag(i, paramName) {
  // Simple flag UI (numeric check)
  const val = parseFloat(document.getElementById('param-'+i)?.value);
  const flagEl = document.getElementById('flag-'+i);
  if (!flagEl || isNaN(val)) return;
  flagEl.innerHTML = '<span class="flag normal">Normal</span>';
}

async function saveReport() {
  if (!selectedReq) return;
  const btn = document.getElementById('saveReportBtn');
  const err = document.getElementById('r-err');
  const succ = document.getElementById('r-succ');
  err.style.display='none'; succ.style.display='none';

  const params = window._labParams||[];
  const results = params.map((p,i)=>({ parameter:p.name, value:document.getElementById('param-'+i)?.value||'', unit:p.unit, normal_range:p.normal }));

  btn.disabled=true; btn.textContent='Saving...';
  try {
    const res = await fetch('/api/resource/Lab Report', {
      method:'POST', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
      body: JSON.stringify({
        doctype:'Lab Report',
        patient: selectedReq.patient,
        patient_name: selectedReq.patient_name,
        token_number: selectedReq.token_number,
        lab_request: selectedReq.name,
        test_name: selectedReq.test_name,
        results: JSON.stringify(results),
        remarks: document.getElementById('lab-notes').value,
        sample_type: document.getElementById('sample-type').value,
        reported_at: new Date().toISOString(),
        status:'Completed'
      })
    });
    if (!res.ok) { const d=await res.json(); throw new Error(d.exc||'Save failed'); }

    // Update Lab Request status
    await fetch(`/api/resource/Lab Request/${selectedReq.name}`, {
      method:'PUT', headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':getCsrf()}, credentials:'include',
      body: JSON.stringify({ status:'Completed' })
    });

    succ.textContent = `✅ Lab report saved for ${selectedReq.patient_name}. ${results.length} parameters recorded.`;
    succ.style.display='block';
    selectedReq = null;
    setTimeout(()=>{ loadQueue(); document.getElementById('reportPanel').innerHTML='<div class="empty-state"><div style="font-size:3rem">🔬</div><div>Select a lab request to enter results</div></div>'; }, 1500);
  } catch(e) {
    err.textContent='Error: '+(e.message||String(e)); err.style.display='block'; console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='Save Report & Mark Completed';
  }
}

checkAuth();
loadQueue();
setInterval(loadQueue, 20000);
</script>
</body>
</html>
